<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
    <h2 class="mb-4 text-center text-primary">Login</h2>


     <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">Benutzername</label>
        <input
          type="text"
          class="form-control"
          id="username"
          name="username"
          placeholder="Benutzername"
          required
          [(ngModel)]="username"
          #usernameInput="ngModel"
        />
        <div *ngIf="usernameInput.invalid && usernameInput.touched" class="text-danger small">
          Benutzername ist erforderlich
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Passwort</label>
        <div class="input-group">
          <input
            [type]="passwordVisible ? 'text' : 'password'"
            class="form-control"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            [(ngModel)]="password"
            #passwordInput="ngModel"
          />
          <button
            type="button"
            class="btn btn-outline-secondary"
            (click)="passwordVisible = !passwordVisible"
            [attr.aria-label]="passwordVisible ? 'Passwort verbergen' : 'Passwort anzeigen'"
          >
            <i [class]="passwordVisible ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
        <div *ngIf="passwordInput.invalid && passwordInput.touched" class="text-danger small">
          Passwort ist erforderlich
        </div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">Einloggen</button>
      </div>
    </form>



   <div class="text-center mt-3">
      <small class="text-muted">
        <a routerLink="/register">Registrieren</a> | <a routerLink="/password-reset">Passwort vergessen?</a>
      </small>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger mt-3">
      {{ errorMessage }}
    </div>
  </div>
</div>
